name: export-secrets
description: >-
  Authenticate to Imbue Vault via GitHub OIDC and inject the requested secrets
  into the job environment, masking their values in the logs.

inputs:
  role:
    description: Vault auth role to assume (a role on the jwt_github_actions backend).
    required: true
  secrets:
    description: >-
      Secret paths to fetch, one per line (or whitespace-separated). Each may
      carry an optional @VERSION suffix. The last path component becomes the
      environment variable name; the value is read from the secret's "value"
      field.
    required: true
  export-token:
    description: >-
      If "true", also export VAULT_TOKEN so later steps can make their own Vault
      calls. Defaults to false (least privilege).
    required: false
    default: "false"

outputs:
  pinned:
    description: Space-separated "path@version" for each fetched secret, for reproducibility.
    value: ${{ steps.fetch.outputs.pinned }}

runs:
  using: composite
  steps:
    - name: Fetch secrets into the environment
      id: fetch
      shell: bash
      env:
        VAULT_AUTH_ROLE: ${{ inputs.role }}
        SECRETS: ${{ inputs.secrets }}
        EXPORT_VAULT_TOKEN: ${{ inputs.export-token }}
      run: |
        # The backing script sits next to this action.yml at the repo root.
        # SECRETS is intentionally word-split into separate path arguments.
        # shellcheck disable=SC2086
        bash "${{ github.action_path }}/export-secrets-github" $SECRETS
