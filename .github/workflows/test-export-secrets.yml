# Exercises the export-secrets composite action this repo provides, by fetching
# a dedicated fake secret (vault-repo-test/FAKE_SECRET) and checking its value.
# Authorization for this repo to read vault-repo-test/* is configured by the
# vault_repo_test_gh role in the imbue-ai/vault Terraform (terraform/github_actions.tf).
#
# Triggers on push (which also covers same-repo PR branches) and manual dispatch.
# Fork pull requests are intentionally not covered: GitHub does not grant them
# the id-token permission, so they cannot authenticate to Vault.
name: Test export-secrets

on:
  push:
  workflow_dispatch:

jobs:
  test-export-secrets:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required: lets the job mint an OIDC token for Vault
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          role: vault_repo_test_gh
          secrets: vault-repo-test/FAKE_SECRET

      - name: Verify the secret was injected
        run: |
          if [ "$FAKE_SECRET" = "FAKE_VALUE" ]; then
            echo "export-secrets injected vault-repo-test/FAKE_SECRET correctly."
          else
            # The expected value is masked in the logs, so report only the length.
            echo "FAKE_SECRET has an unexpected value (length ${#FAKE_SECRET})." >&2
            exit 1
          fi
